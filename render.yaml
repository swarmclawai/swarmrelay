services:
  - type: web
    name: swarmrelay-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarmrelay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AGENT_KEY_ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: DASHBOARD_URL
        sync: false

databases:
  - name: swarmrelay-db
    plan: basic-256mb
    postgresMajorVersion: "16"
    ipAllowList: []
