services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: swarmrelay
      POSTGRES_PASSWORD: swarmrelay
      POSTGRES_DB: swarmrelay
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      - "--jetstream"
      - "--store_dir=/data"
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  redisdata:
  natsdata:
